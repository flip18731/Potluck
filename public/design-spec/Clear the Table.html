<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Potluck — Clear the Table</title>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,450;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background-color: #F8F5F0;
      color: #1C1917;
      -webkit-font-smoothing: antialiased;
    }
    .tabular { font-variant-numeric: tabular-nums; }

    /* Settle pulse — rows breathe while transfers fire */
    @keyframes settlePulse {
      0%, 100% { opacity: 1; }
      45%       { opacity: 0.38; }
    }
    .settling-pulse {
      animation: settlePulse 1.1s ease-in-out infinite;
    }

    /* Stagger individual rows */
    .row-0 { animation-delay: 0ms; }
    .row-1 { animation-delay: 120ms; }
    .row-2 { animation-delay: 240ms; }
    .row-3 { animation-delay: 360ms; }
    .row-4 { animation-delay: 480ms; }

    /* Animated ellipsis */
    @keyframes dot1 { 0%,66%,100% { opacity:0 } 22% { opacity:1 } }
    @keyframes dot2 { 0%,33%,100% { opacity:0 } 55% { opacity:1 } }
    @keyframes dot3 { 0%,55%,100% { opacity:0 } 77% { opacity:1 } }
    .dot { display: inline-block; }
    .dot-1 { animation: dot1 1.2s infinite; }
    .dot-2 { animation: dot2 1.2s infinite; }
    .dot-3 { animation: dot3 1.2s infinite; }

    /* Entry */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* Only applied on state transitions (Done), not on initial mount */
    .fade-up { animation: fadeUp 0.35s ease both; }

    /* Archived badge pulse-in */
    @keyframes badgePop {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1); }
    }
    .badge-pop { animation: badgePop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s both; }

    button { font-family: inherit; }

    @media (prefers-reduced-motion: reduce) {
      .settling-pulse, .dot, .dot-1, .dot-2, .dot-3,
      .fade-up, .badge-pop { animation: none !important; opacity: 1 !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  /* ─── Data ──────────────────────────────────────────────── */

  const DIST = [
    { handle: 'anna.init',    name: 'Anna',    initials: 'A', amount: 127.50, routing: null    },
    { handle: 'philipp.init', name: 'Philipp', initials: 'P', amount:  34.00, routing: null    },
    { handle: 'lisa.init',    name: 'Lisa',    initials: 'L', amount:   0.00, routing: null    },
    { handle: 'tom.init',     name: 'Tom',     initials: 'T', amount:  30.50, routing: 'Osmosis' },
    { handle: 'maya.init',    name: 'Maya',    initials: 'M', amount: 160.00, routing: 'Mantle', isMe: true },
  ];

  const TOTAL = 352.00;
  const CLOSED_DATE = 'Jan 25, 2026';

  const AVATAR_COL = {
    'anna.init':    { bg: '#D4C5B0', fg: '#5A4A3A' },
    'philipp.init': { bg: '#B9C0CA', fg: '#3A3F50' },
    'lisa.init':    { bg: '#BBC8B6', fg: '#3A5038' },
    'tom.init':     { bg: '#CAB9B0', fg: '#5A3A38' },
    'maya.init':    { bg: '#C07A38', fg: '#FFFFFF' },
  };

  /* ─── Helpers ────────────────────────────────────────────── */

  const eur = n => {
    const [i, d] = Math.abs(n).toFixed(2).split('.');
    return `€${i.replace(/\B(?=(\d{3})+(?!\d))/g, ',')}.${d}`;
  };

  /* ─── Avatar ─────────────────────────────────────────────── */

  function Avatar({ handle, initials, size = 30 }) {
    const c = AVATAR_COL[handle] || { bg: '#CCC', fg: '#666' };
    return (
      <div style={{
        width: size, height: size, borderRadius: '50%', flexShrink: 0,
        backgroundColor: c.bg, color: c.fg,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: size * 0.36, fontWeight: 500, userSelect: 'none',
      }}>{initials}</div>
    );
  }

  /* ─── Distribution Row ───────────────────────────────────── */

  function DistRow({ member, rowIdx, phase }) {
    const zero     = member.amount === 0;
    const settling = phase === 'settling';

    return (
      <div style={{
        display: 'flex', alignItems: 'center', gap: 12,
        padding: '13px 0',
        borderBottom: '1px solid #EDE8E1',
      }}>
        {/* Avatar */}
        <Avatar handle={member.handle} initials={member.initials} size={30} />

        {/* Identity */}
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <span style={{ fontSize: 14, fontWeight: 480, color: '#1C1917' }}>{member.name}</span>
            {member.isMe && <span style={{ fontSize: 11, color: '#A8A29E' }}>you</span>}
          </div>
          <div className="tabular" style={{ fontSize: 11.5, color: '#A8A29E', marginTop: 1 }}>
            @{member.handle}
          </div>
        </div>

        {/* Amount + routing */}
        <div style={{ textAlign: 'right', flexShrink: 0 }}>
          <div
            className={`tabular${settling ? ` settling-pulse row-${rowIdx}` : ''}`}
            style={{
              fontSize: 15,
              fontWeight: zero ? 400 : 520,
              color: zero ? '#C4BAB0' : '#1C1917',
              letterSpacing: '-0.015em',
              transition: 'color 0.3s',
            }}
          >
            {zero ? '—' : eur(member.amount)}
          </div>

          {/* Routing chip — only if they have a preference and amount > 0 */}
          {member.routing && !zero && (
            <div style={{
              marginTop: 3, display: 'flex', alignItems: 'center',
              justifyContent: 'flex-end', gap: 5,
            }}>
              <span style={{ fontSize: 11, color: '#B8B0A8' }}>
                → {member.routing}
              </span>
              {/* Only show 'change' for current user in pre-commit */}
              {member.isMe && phase === 'pre' && (
                <button style={{
                  fontSize: 11, color: '#C9C1B8',
                  background: 'none', border: 'none', padding: 0,
                  cursor: 'pointer', textDecoration: 'underline',
                  textDecorationColor: '#DDD6CE',
                }}>change</button>
              )}
            </div>
          )}
        </div>
      </div>
    );
  }

  /* ─── Dot spinner ────────────────────────────────────────── */

  const Dots = () => (
    <span aria-hidden="true">
      <span className="dot dot-1">·</span>
      <span className="dot dot-2">·</span>
      <span className="dot dot-3">·</span>
    </span>
  );

  /* ─── Pre-commit view ────────────────────────────────────── */

  function PreCommit({ onSettle }) {
    const [btn, setBtn] = useState('idle'); // idle | confirm

    return (
      <div>
        {/* Context */}
        <div style={{ marginBottom: 30 }}>
          <p style={{ fontSize: 12, color: '#A8A29E', fontWeight: 450, marginBottom: 8 }}>
            Ski Trip 2026 &nbsp;·&nbsp; Val d'Isère &nbsp;·&nbsp; Jan 13–19
          </p>
          <h1 style={{ fontSize: 28, fontWeight: 640, letterSpacing: '-0.025em', color: '#1C1917', lineHeight: 1.1, marginBottom: 5 }}>
            Clear the table
          </h1>
          <p style={{ fontSize: 14, color: '#A8A29E' }}>
            Everyone's covered. Review the distribution below.
          </p>
        </div>

        {/* Total header row */}
        <div style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          padding: '0 0 14px', borderBottom: '1px solid #EDE8E1', marginBottom: 0,
        }}>
          <span style={{ fontSize: 12, color: '#A8A29E', fontWeight: 450 }}>Distributing</span>
          <span className="tabular" style={{ fontSize: 15.5, fontWeight: 600, color: '#1C1917', letterSpacing: '-0.02em' }}>
            {eur(TOTAL)}
          </span>
        </div>

        {/* Rows */}
        {DIST.map((m, i) => (
          <DistRow key={m.handle} member={m} rowIdx={i} phase="pre" />
        ))}

        {/* Total confirmation */}
        <div style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          padding: '14px 0 0', marginBottom: 36,
        }}>
          <span style={{ fontSize: 13, color: '#78716C', fontWeight: 490 }}>
            5 members · all covered
          </span>
          <span className="tabular" style={{ fontSize: 14, fontWeight: 560, color: '#1C1917', letterSpacing: '-0.015em' }}>
            {eur(TOTAL)}
          </span>
        </div>

        {/* Rule */}
        <div style={{ height: 1, background: '#EDE8E1', marginBottom: 26 }} />

        {/* Commit button */}
        <button
          onClick={() => {
            if (btn === 'idle') {
              setBtn('confirm');
            } else {
              onSettle();
            }
          }}
          style={{
            width: '100%',
            padding: '14px 0',
            backgroundColor: btn === 'confirm' ? '#1C1917' : '#C07A38',
            color: '#FFFFFF',
            border: 'none',
            borderRadius: 7,
            fontSize: 15,
            fontWeight: 590,
            cursor: 'pointer',
            letterSpacing: '-0.01em',
            transition: 'background-color 0.22s ease',
          }}
          onMouseEnter={e => { e.currentTarget.style.opacity = '0.88'; }}
          onMouseLeave={e => { e.currentTarget.style.opacity = '1'; }}
          aria-label={btn === 'idle' ? 'Clear the table' : 'Confirm — clear the table'}
        >
          {btn === 'idle' ? 'Clear the table' : 'Confirm — clear the table'}
        </button>

        <p style={{ textAlign: 'center', fontSize: 12, color: '#C4BAB0', marginTop: 10 }}>
          {btn === 'idle'
            ? 'This action archives the potluck and can\'t be undone.'
            : 'All transfers fire at once. This can\'t be undone.'}
        </p>
      </div>
    );
  }

  /* ─── Settling view ──────────────────────────────────────── */

  function Settling() {
    return (
      <div>
        {/* Context — same as pre */}
        <div style={{ marginBottom: 30 }}>
          <p style={{ fontSize: 12, color: '#A8A29E', fontWeight: 450, marginBottom: 8 }}>
            Ski Trip 2026 &nbsp;·&nbsp; Val d'Isère &nbsp;·&nbsp; Jan 13–19
          </p>
          <h1 style={{ fontSize: 28, fontWeight: 640, letterSpacing: '-0.025em', color: '#1C1917', lineHeight: 1.1, marginBottom: 5 }}>
            Clear the table
          </h1>
          <p style={{ fontSize: 14, color: '#A8A29E' }}>
            Settling up<Dots />
          </p>
        </div>

        {/* Total header row */}
        <div style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          padding: '0 0 14px', borderBottom: '1px solid #EDE8E1',
        }}>
          <span style={{ fontSize: 12, color: '#A8A29E', fontWeight: 450 }}>Distributing</span>
          <span className="tabular" style={{ fontSize: 15.5, fontWeight: 600, color: '#1C1917', letterSpacing: '-0.02em' }}>
            {eur(TOTAL)}
          </span>
        </div>

        {/* Pulsing rows */}
        {DIST.map((m, i) => (
          <DistRow key={m.handle} member={m} rowIdx={i} phase="settling" />
        ))}

        <div style={{ padding: '18px 0 0', marginBottom: 36 }}>
          <span style={{ fontSize: 13, color: '#C4BAB0' }}>5 members · all covered</span>
        </div>

        <div style={{ height: 1, background: '#EDE8E1', marginBottom: 26 }} />

        {/* Inert button while settling */}
        <div style={{
          width: '100%', padding: '14px 0',
          backgroundColor: '#EDE8E1',
          borderRadius: 7, textAlign: 'center',
          fontSize: 14, color: '#B8B0A8',
          fontWeight: 490, letterSpacing: '-0.005em',
          userSelect: 'none',
        }}>
          Settling<Dots />
        </div>
      </div>
    );
  }

  /* ─── Done / Aftermath view ──────────────────────────────── */

  function Done() {
    const me = DIST.find(m => m.isMe);
    return (
      <div className="fade-up">
        {/* Context with archived badge */}
        <div style={{ marginBottom: 32 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 9, marginBottom: 9 }}>
            <p style={{ fontSize: 12, color: '#A8A29E', fontWeight: 450 }}>
              Ski Trip 2026 &nbsp;·&nbsp; Val d'Isère &nbsp;·&nbsp; Jan 13–19
            </p>
            <span
              className="badge-pop"
              style={{
                fontSize: 10, fontWeight: 600, padding: '2px 7px',
                borderRadius: 20, backgroundColor: '#F0EBE3',
                color: '#A8A29E', letterSpacing: '0.06em', textTransform: 'uppercase',
              }}
            >Archived</span>
          </div>
          <h1 style={{ fontSize: 28, fontWeight: 640, letterSpacing: '-0.025em', color: '#1C1917', lineHeight: 1.1, marginBottom: 5 }}>
            All settled.
          </h1>
          <p style={{ fontSize: 14, color: '#A8A29E' }}>
            {eur(TOTAL)} distributed &nbsp;·&nbsp; {CLOSED_DATE}
          </p>
        </div>

        {/* Distribution — confirmed, quiet */}
        <div style={{ borderBottom: '1px solid #EDE8E1' }}>
          {DIST.map((m, i) => (
            <DistRow key={m.handle} member={m} rowIdx={i} phase="done" />
          ))}
        </div>

        {/* Maya's personal routing confirmation */}
        <div style={{
          padding: '15px 16px',
          backgroundColor: '#FDF3E8',
          borderRadius: 7,
          margin: '20px 0 30px',
        }}>
          <p style={{ fontSize: 13.5, color: '#78716C', lineHeight: 1.6 }}>
            <span className="tabular" style={{ fontWeight: 560, color: '#4A3D35' }}>{eur(me.amount)}</span>
            {' '}is on its way to your {me.routing} account. Usually arrives within a few minutes.
          </p>
        </div>

        {/* Actions */}
        <div style={{ display: 'flex', gap: 10 }}>
          <button
            style={{
              flex: 1, padding: '10px 0',
              backgroundColor: 'transparent',
              border: '1px solid #E2D9CE',
              borderRadius: 6, fontSize: 13.5,
              fontWeight: 450, color: '#78716C',
              cursor: 'pointer', transition: 'border-color 0.15s, color 0.15s',
            }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = '#C07A38'; e.currentTarget.style.color = '#C07A38'; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = '#E2D9CE'; e.currentTarget.style.color = '#78716C'; }}
          >View full history</button>

          <button
            style={{
              flex: 1, padding: '10px 0',
              backgroundColor: '#1C1917',
              border: 'none', borderRadius: 6,
              fontSize: 13.5, fontWeight: 500,
              color: '#FFFFFF', cursor: 'pointer',
              transition: 'opacity 0.15s',
            }}
            onMouseEnter={e => e.currentTarget.style.opacity = '0.8'}
            onMouseLeave={e => e.currentTarget.style.opacity = '1'}
          >Back to dashboard</button>
        </div>
      </div>
    );
  }

  /* ─── App shell ──────────────────────────────────────────── */

  function App() {
    // phase drives the actual screen content
    const [phase, setPhase]               = useState('pre'); // pre | settling | done
    // previewPhase is the design-review override
    const [previewPhase, setPreviewPhase] = useState('pre');
    const timerRef = useRef(null);

    // Sync content phase with preview override
    useEffect(() => {
      if (timerRef.current) clearTimeout(timerRef.current);
      setPhase(previewPhase);
      if (previewPhase === 'settling') {
        timerRef.current = setTimeout(() => {
          setPhase('done');
          setPreviewPhase('done');
        }, 1800);
      }
      return () => clearTimeout(timerRef.current);
    }, [previewPhase]);

    const handleSettle = () => {
      setPreviewPhase('settling');
    };

    // Back nav label
    const backLabel = phase === 'done' ? 'Dashboard' : 'Ski Trip 2026';

    return (
      <div style={{ minHeight: '100vh', backgroundColor: '#F8F5F0', paddingBottom: 72 }}>

        {/* ── Nav ── */}
        <nav style={{
          position: 'sticky', top: 0, zIndex: 20,
          backgroundColor: '#F8F5F0',
          borderBottom: '1px solid #EDE8E1',
        }}>
          <div style={{
            maxWidth: 1080, margin: '0 auto',
            padding: '0 32px', height: 52,
            display: 'flex', alignItems: 'center',
          }}>
            <button
              style={{
                display: 'flex', alignItems: 'center', gap: 6,
                fontSize: 13, color: '#A8A29E',
                background: 'none', border: 'none',
                cursor: 'pointer', padding: 0,
                transition: 'color 0.15s',
              }}
              onMouseEnter={e => e.currentTarget.style.color = '#1C1917'}
              onMouseLeave={e => e.currentTarget.style.color = '#A8A29E'}
              aria-label={`Back to ${backLabel}`}
            >
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
                <path d="M9.5 12L5 7.5 9.5 3" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
              {backLabel}
            </button>
          </div>
        </nav>

        {/* ── Content ── */}
        <main style={{
          maxWidth: 520, margin: '0 auto',
          padding: '48px 32px 32px',
        }}>
          {phase === 'pre'      && <PreCommit onSettle={handleSettle} />}
          {phase === 'settling' && <Settling />}
          {phase === 'done'     && <Done />}
        </main>

        {/* ── Design preview annotation strip ── */}
        <div
          role="navigation"
          aria-label="Design state preview"
          style={{
            position: 'fixed', bottom: 0, left: 0, right: 0,
            backgroundColor: '#141010',
            borderTop: '1px solid rgba(255,255,255,0.06)',
            padding: '10px 24px',
            display: 'flex', alignItems: 'center', gap: 20,
            zIndex: 200,
          }}
        >
          <span style={{
            fontSize: 10, color: '#4A4440', fontWeight: 600,
            letterSpacing: '0.1em', textTransform: 'uppercase',
            flexShrink: 0,
          }}>
            State
          </span>

          <div style={{ display: 'flex', gap: 4 }}>
            {[
              { id: 'pre',      label: '① Pre-commit'  },
              { id: 'settling', label: '② Settling'    },
              { id: 'done',     label: '③ Done'        },
            ].map(s => {
              const active = previewPhase === s.id;
              return (
                <button
                  key={s.id}
                  onClick={() => setPreviewPhase(s.id)}
                  style={{
                    fontSize: 12, fontWeight: 480,
                    color: active ? '#F8F5F0' : '#5A5050',
                    backgroundColor: active ? 'rgba(255,255,255,0.10)' : 'transparent',
                    border: 'none', borderRadius: 5,
                    padding: '5px 12px', cursor: 'pointer',
                    transition: 'all 0.15s',
                  }}
                >
                  {s.label}
                </button>
              );
            })}
          </div>

          <span style={{
            marginLeft: 'auto', fontSize: 11, color: '#3A3030',
            fontStyle: 'italic',
          }}>
            Click ① → ② → ③ or use the button on screen
          </span>
        </div>

      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
